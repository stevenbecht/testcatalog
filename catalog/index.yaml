apiVersion: suse.ai/v1alpha1
kind: CatalogIndex
metadata:
  name: public-test
spec:
  displayName: Public Test Catalog
  description: Minimal public catalog used to test controller-backed inspect and sync.
  owners:
    - ai-factory
  bundleMode: generated
  source:
    git:
      url: https://github.com/stevenbecht/testcatalog
      ref: main
  discovery:
    blueprintGlobs:
      - catalog/blueprints/*/blueprint.yaml
    bundleGlobs:
      - catalog/bundles/*/bundle.yaml
      - catalog/bundles/*/*.yaml
  ui:
    color: "#2563eb"
  entries:
    - name: assistant-starter
      displayName: Assistant Starter
      description: Minimal assistant stack with Ollama and Open WebUI.
      category: AI Application
      source:
        git:
          path: catalog/blueprints/assistant-starter/blueprint.yaml
    - name: rag-workbench
      displayName: RAG Workbench
      description: RAG stack with Ollama, Milvus, and Open WebUI.
      category: AI Application
      source:
        git:
          path: catalog/blueprints/rag-workbench/blueprint.yaml
    - name: inference-lab
      displayName: Inference Lab
      description: GPU inference playground with NVIDIA GPU Operator and vLLM.
      category: Serving
      source:
        git:
          path: catalog/blueprints/inference-lab/blueprint.yaml
